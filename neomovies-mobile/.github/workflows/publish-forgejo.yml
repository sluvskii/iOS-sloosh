name: Publish to Forgejo

on:
  workflow_dispatch:
    inputs:
      github_release_tag:
        description: 'GitHub Release tag to publish (e.g., v0.1.0-pre7)'
        required: true
        type: string

permissions:
  contents: read

env:
  FORGEJO_API_URL: https://git.disroot.org/api/v1
  FORGEJO_OWNER: Neo
  FORGEJO_REPO: neomovies-mobile

jobs:
  publish-to-forgejo:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch GitHub Release info
        id: gh_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.github_release_tag }}
        run: |
          echo "Fetching release info for tag: $TAG"

          # Get release info
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/tags/$TAG)

          IS_PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.prerelease')
          RELEASE_NAME=$(echo "$RELEASE_JSON" | jq -r '.name')
          RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body')

          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

          # Save body to file (may contain newlines)
          echo "$RELEASE_BODY" > /tmp/release_body.txt

          # Get asset download URLs
          echo "$RELEASE_JSON" | jq -r '.assets[] | .browser_download_url' > /tmp/asset_urls.txt

          echo "Found $(wc -l < /tmp/asset_urls.txt) assets"
          cat /tmp/asset_urls.txt

      - name: Download GitHub Release assets
        shell: bash
        run: |
          mkdir -p release-files

          while IFS= read -r url; do
            filename=$(basename "$url")
            echo "Downloading $filename..."
            curl -sS -L -o "release-files/$filename" "$url"
          done < /tmp/asset_urls.txt

          echo "Downloaded files:"
          ls -lh release-files/

      - name: Create or find Forgejo Release
        id: forgejo_release
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          TAG_NAME: ${{ inputs.github_release_tag }}
          IS_PRERELEASE: ${{ steps.gh_release.outputs.is_prerelease }}
          RELEASE_NAME: ${{ steps.gh_release.outputs.release_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FORGEJO_TOKEN:-}" ]; then
            echo "FORGEJO_TOKEN secret is not set"
            exit 1
          fi

          RELEASE_URL="$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases/tags/$TAG_NAME"

          HTTP_CODE=$(curl -sS -o /tmp/forgejo-release.json -w "%{http_code}" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            "$RELEASE_URL")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Forgejo release already exists"
          else
            echo "Creating Forgejo release"

            RELEASE_BODY=$(cat /tmp/release_body.txt)

            jq -n \
              --arg tag "$TAG_NAME" \
              --arg name "$RELEASE_NAME" \
              --arg body "$RELEASE_BODY" \
              --argjson prerelease "$IS_PRERELEASE" \
              '{
                tag_name: $tag,
                name: $name,
                body: $body,
                draft: false,
                prerelease: $prerelease
              }' > /tmp/forgejo-create-release.json

            curl -sS -f \
              -X POST \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -H "Content-Type: application/json" \
              "$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases" \
              --data @/tmp/forgejo-create-release.json \
              > /tmp/forgejo-release.json
          fi

          RELEASE_ID=$(jq -r '.id' /tmp/forgejo-release.json)

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Failed to get Forgejo release id"
            cat /tmp/forgejo-release.json
            exit 1
          fi

          echo "id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: Upload files to Forgejo
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          RELEASE_ID: ${{ steps.forgejo_release.outputs.id }}
          TAG_NAME: ${{ inputs.github_release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          upload_asset() {
            local file="$1"
            local name
            name="$(basename "$file")"

            echo "Uploading $name to Forgejo..."

            local size
            size=$(stat -c%s "$file")
            local size_mb=$((size / 1024 / 1024))

            # Try Forgejo Releases API first (has size limit ~100MB)
            if [ "$size_mb" -lt 90 ]; then
              if curl -sS -f \
                -X POST \
                -H "Authorization: token $FORGEJO_TOKEN" \
                -F "attachment=@$file" \
                "$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases/$RELEASE_ID/assets?name=$name" \
                > /dev/null 2>&1; then
                echo "✅ Uploaded $name to Forgejo Releases"
                return 0
              fi
            fi

            # For large files, use Forgejo Generic Packages
            echo "Uploading $name to Forgejo Packages (${size_mb}MB)..."
            if curl -sS -f \
              -X PUT \
              -H "Authorization: token $FORGEJO_TOKEN" \
              --upload-file "$file" \
              "https://git.disroot.org/api/packages/$FORGEJO_OWNER/generic/neomovies-mobile/$TAG_NAME/$name" \
              > /dev/null 2>&1; then
              echo "✅ Uploaded $name to Forgejo Packages"
              return 0
            fi

            echo "⚠️  Failed to upload $name"
          }

          shopt -s nullglob

          for f in release-files/*.apk; do
            upload_asset "$f"
          done

          for f in release-files/*.ipa; do
            upload_asset "$f"
          done

          echo ""
          echo "✅ Published to Forgejo:"
          echo "  - Releases: https://git.disroot.org/$FORGEJO_OWNER/$FORGEJO_REPO/releases/tag/$TAG_NAME"
          echo "  - Packages: https://git.disroot.org/$FORGEJO_OWNER/-/packages/generic/neomovies-mobile/$TAG_NAME"

      - name: Update AltStore manifest on Forgejo
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          TAG_NAME: ${{ inputs.github_release_tag }}
        shell: bash
        run: |
          if [ -z "${FORGEJO_TOKEN:-}" ]; then
            echo "FORGEJO_TOKEN is not set, skipping manifest update"
            exit 0
          fi

          VERSION="${TAG_NAME#v}"
          DATE=$(date -u +"%Y-%m-%d")

          # Find iOS IPA
          IPA_FILE=$(ls release-files/*.ipa | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA file found, skipping manifest update"
            exit 0
          fi

          IPA_SIZE=$(stat -c%s "$IPA_FILE")
          IPA_NAME=$(basename "$IPA_FILE")

          # Determine if prerelease
          if [[ "$TAG_NAME" == *"pre"* ]] || [[ "$TAG_NAME" == *"alpha"* ]] || [[ "$TAG_NAME" == *"beta"* ]]; then
            IS_BETA=true
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/$IPA_NAME"
          else
            IS_BETA=false
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/latest/download/$IPA_NAME"
          fi

          # Clone Forgejo repo with token
          git clone "https://oauth2:${FORGEJO_TOKEN}@git.disroot.org/Neo/neomovies-mobile.git" forgejo-repo
          cd forgejo-repo

          # Update manifest
          cat altstore-source.json | jq \
            --arg ver "$VERSION" \
            --arg date "$DATE" \
            --arg size "$IPA_SIZE" \
            --arg url "$DOWNLOAD_URL" \
            --argjson beta "$IS_BETA" \
            '.apps[0].version = $ver |
             .apps[0].versionDate = $date |
             .apps[0].size = ($size | tonumber) |
             .apps[0].downloadURL = $url |
             .apps[0].beta = $beta' \
            > altstore-source.tmp.json

          mv altstore-source.tmp.json altstore-source.json

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit and push
          git add altstore-source.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update AltStore manifest to $VERSION"
            git push origin main || echo "Failed to push manifest update"
          fi

          cd ..
          rm -rf forgejo-repo

          echo "✅ Updated AltStore manifest"
