disabled_rules:
  - line_length
  - trailing_whitespace
  - vertical_whitespace
  - identifier_name
  - type_name
  - force_cast
  - force_try
  - trailing_comma
  - large_tuple
  - function_body_length
  - type_body_length
  - file_length
  - cyclomatic_complexity
  - multiple_closures_with_trailing_closure
  - nesting
  - unneeded_break_in_switch

opt_in_rules:
  - empty_count
  - empty_string

included:
  - sloosh/Sources

