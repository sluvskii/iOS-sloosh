name: sloosh
options:
  bundleIdPrefix: com
targets:
  sloosh:
    type: application
    platform: iOS
    deploymentTarget: "26.0" # Updated to target iOS 26 to enable Liquid Glass design
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sloosh.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: sloosh/Sources
      - path: sloosh/Resources
        excludes:
          - AppIcon.icon
      - path: sloosh/Resources/AppIcon.icon
        type: folder.iconcomposer.icon
        buildPhase: resources
    info:
      path: sloosh/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
