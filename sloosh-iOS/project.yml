name: sloosh
options:
  bundleIdPrefix: com
targets:
  sloosh:
    type: application
    platform: iOS
    deploymentTarget: "16.0" # Back to 16.0 to match the original project architecture, custom UI styling used
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sloosh.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: sloosh/Sources
      - path: sloosh/Resources
    info:
      path: sloosh/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
