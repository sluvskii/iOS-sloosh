name: sloosh
options:
  bundleIdPrefix: com
  xcodeVersion: "15.4"
targets:
  sloosh:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sloosh.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        MARKETING_VERSION: "1.5"
        CURRENT_PROJECT_VERSION: "890"
        INFOPLIST_KEY_CFBundleShortVersionString: "1.5"
        INFOPLIST_KEY_CFBundleVersion: "890"
    sources:
      - path: sloosh/Sources
      - path: sloosh/Resources
    info:
      path: sloosh/Info.plist
      properties:
        CFBundleShortVersionString: "1.5"
        CFBundleVersion: "890"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
