name: iOS Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Lint запускается параллельно только для PR, не блокирует сборку
  lint:
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-swiftlint-${{ runner.os }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          cd sloosh-iOS
          swiftlint lint --reporter github-actions-logging
        continue-on-error: true

  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}-v1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install iOS Runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Inject Build Number
        run: |
          cd sloosh-iOS
          sed -i '' "s/890/${{ github.run_number }}/g" project.yml
          sed -i '' "s/890/${{ github.run_number }}/g" sloosh/Info.plist
          # Read base marketing version (e.g. "1.5") BEFORE any modification
          BASE_VER=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" sloosh/Info.plist)
          FULL_VER="${BASE_VER}.${{ github.run_number }}"
          echo "FULL_VER=$FULL_VER" >> $GITHUB_ENV
          # Patch project.yml so xcodegen picks up the full version
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: $FULL_VER/" project.yml

      - name: Generate Xcode Project
        run: |
          cd sloosh-iOS
          xcodegen generate

      - name: Patch Version After XcodeGen
        run: |
          cd sloosh-iOS
          # Unconditionally force the correct version regardless of what xcodegen produced
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $FULL_VER" sloosh/Info.plist
          echo "Final CFBundleShortVersionString: $(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' sloosh/Info.plist)"


      - name: Build iOS App
        run: |
          cd sloosh-iOS
          xcodebuild build \
            -project sloosh.xcodeproj \
            -scheme sloosh \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -quiet

      - name: Package IPA (Unsigned)
        run: |
          cd sloosh-iOS
          mkdir -p Payload
          mv build/Build/Products/Release-iphoneos/sloosh.app Payload/
          zip -r sloosh.ipa Payload

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: build-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: Development Build #${{ github.run_number }}
          body: |
            Auto-generated IPA build from the latest commit.
            **Note:** This is an unsigned IPA file. You need to use tools like TrollStore, AltStore, or SideStore to install it.
          files: sloosh-iOS/sloosh.ipa
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate AltStore JSON
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir altstore
          SIZE=$(stat -f%z sloosh-iOS/sloosh.ipa || echo 0)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # FULL_VER is set in GITHUB_ENV by "Inject Build Number" step (e.g. "1.5.1097")
          cat << EOF > altstore/apps.json
          {
            "name": "sloosh repo",
            "identifier": "com.sluvskii.sloosh.repo",
            "sourceURL": "https://sluvskii.github.io/iOS-sloosh/apps.json",
            "apps": [
              {
                "name": "sloosh",
                "bundleIdentifier": "com.sluvskii.sloosh",
                "developerName": "sluvskii",
                "version": "$FULL_VER",
                "versionDate": "$DATE",
                "versionDescription": "Build #${{ github.run_number }}",
                "downloadURL": "https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_number }}/sloosh.ipa",
                "localizedDescription": "sloosh premium streaming",
                "iconURL": "https://raw.githubusercontent.com/${{ github.repository }}/main/sloosh-iOS/sloosh/Resources/Assets.xcassets/AppIcon.appiconset/light.png",
                "tintColor": "000000",
                "size": $SIZE
              }
            ]
          }
          EOF

      - name: Publish AltStore Source to gh-pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./altstore
          publish_branch: gh-pages
          force_orphan: true
