name: iOS Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Run SwiftLint
      run: |
        brew install swiftlint
        cd sloosh-iOS
        swiftlint lint --reporter github-actions-logging
      continue-on-error: true

    - name: Generate Xcode Project
      run: |
        cd sloosh-iOS
        xcodegen generate

    - name: Build iOS App
      run: |
        cd sloosh-iOS
        xcodebuild clean build \
          -project sloosh.xcodeproj \
          -scheme sloosh \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -sdk iphoneos \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Package IPA (Unsigned)
      run: |
        cd sloosh-iOS
        mkdir -p Payload
        mv build/Build/Products/Release-iphoneos/sloosh.app Payload/
        zip -r sloosh.ipa Payload

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      with:
        tag_name: build-${{ github.run_number }}
        target_commitish: ${{ github.sha }}
        name: Development Build #${{ github.run_number }}
        body: |
          Auto-generated IPA build from the latest commit.
          **Note:** This is an unsigned IPA file. You need to use tools like TrollStore, AltStore, or SideStore to install it.
        files: sloosh-iOS/sloosh.ipa
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
