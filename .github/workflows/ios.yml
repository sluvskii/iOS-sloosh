name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: |
        cd NeoMovies-iOS
        xcodegen generate

    - name: Build iOS App
      run: |
        cd NeoMovies-iOS
        xcodebuild clean build \
          -project NeoMovies.xcodeproj \
          -scheme NeoMovies \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Package IPA (Unsigned)
      run: |
        cd NeoMovies-iOS
        mkdir -p Payload
        mv build/Build/Products/Release-iphoneos/NeoMovies.app Payload/
        zip -r NeoMovies.ipa Payload

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: latest
        name: Development Build (Latest)
        body: |
          Auto-generated IPA build from the latest commit.
          **Note:** This is an unsigned IPA file. You need to use tools like TrollStore, AltStore, or SideStore to install it.
        files: NeoMovies-iOS/NeoMovies.ipa
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
