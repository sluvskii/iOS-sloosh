name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: |
        cd sloosh-iOS
        xcodegen generate

    - name: Build iOS App
      run: |
        cd sloosh-iOS
        xcodebuild clean build \
          -project sloosh.xcodeproj \
          -scheme sloosh \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO > build.log 2>&1 || (curl -F "file=@build.log" https://file.io && exit 1)




    - name: Push log on failure
      if: failure()
      run: |
        git config --global user.name "Bot"
        git config --global user.email "bot@example.com"
        cp sloosh-iOS/build.log ./xcodebuild_error.log || echo "cp failed"
        git checkout -b build-log-branch
        git add xcodebuild_error.log
        git commit -m "Upload xcodebuild log"
        git push origin build-log-branch --force

    - name: Package IPA (Unsigned)
      run: |
        cd sloosh-iOS
        mkdir -p Payload
        mv build/Build/Products/Release-iphoneos/sloosh.app Payload/
        zip -r sloosh.ipa Payload

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: build-${{ github.run_number }}
        name: Development Build #${{ github.run_number }}
        body: |
          Auto-generated IPA build from the latest commit.
          **Note:** This is an unsigned IPA file. You need to use tools like TrollStore, AltStore, or SideStore to install it.
        files: sloosh-iOS/sloosh.ipa
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
